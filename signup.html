<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Prophetic Flames of Fire Ministries</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fefaf5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-container { background: #fff; border-radius: 32px; padding: 48px; max-width: 420px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.08); border: 1px solid #ede0d0; }
    .auth-container .logo { text-align: center; margin-bottom: 32px; }
    .auth-container .logo img { height: 64px; width: 64px; border-radius: 50%; border: 3px solid #c2813a; padding: 4px; }
    .auth-container .logo h2 { font-family: 'Playfair Display', serif; color: #6b3f1c; font-size: 1.5rem; margin-top: 8px; }
    .auth-container .logo h2 span { color: #c2813a; }
    .auth-container .logo p { color: #8b765c; font-size: 0.85rem; }
    .auth-container h1 { font-family: 'Playfair Display', serif; color: #5e3a1f; font-size: 1.8rem; margin-bottom: 8px; }
    .auth-container .subtitle { color: #8b765c; font-size: 0.9rem; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; color: #3a4a44; font-size: 0.85rem; margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 12px 16px; border-radius: 16px; border: 2px solid #dccdbd; font-family: 'Inter', sans-serif; font-size: 0.95rem; transition: 0.3s; }
    .form-group input:focus { border-color: #c2813a; outline: none; box-shadow: 0 0 0 3px rgba(194,129,58,0.1); }
    .btn-primary { width: 100%; background: linear-gradient(135deg, #c2813a, #a5682e); border: none; color: #fff; padding: 14px; border-radius: 50px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: 0.3s; font-family: 'Inter', sans-serif; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(194,129,58,0.3); }
    .auth-divider { display: flex; align-items: center; gap: 16px; margin: 20px 0; color: #8b765c; font-size: 0.85rem; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: #dccdbd; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #8b765c; }
    .auth-footer a { color: #c2813a; text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
    .alert { background: #f5e0e0; color: #b33c3c; padding: 12px 16px; border-radius: 16px; margin-bottom: 16px; font-size: 0.85rem; display: none; }
    .alert.show { display: block; }
    .success { background: #e0f0ea; color: #2a7f6e; }
    .password-hint { font-size: 0.75rem; color: #8b765c; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="logo">
      <img src="https://i.ibb.co/8nQ0GZVZ/IMG-20260614-WA0030.jpg" alt="Logo" />
      <h2>PROPHETIC <span>FLAMES</span></h2>
      <p>Healing Nations Church</p>
    </div>
    <h1>Create Account</h1>
    <p class="subtitle">Join the Prophetic Flames of Fire Ministries community.</p>
    <div id="alert" class="alert"></div>
    <form id="signupForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your full name" />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="signupEmail" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" />
        <div class="password-hint">Password must be at least 6 characters</div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="signupConfirm" placeholder="Confirm your password" required />
      </div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAnalytics } from "firebase/analytics";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "firebase/auth";

    const firebaseConfig = {
      apiKey: "AIzaSyC7Jf8cw4y-gKLF4kQh-Qq9d5s-8w05R4g",
      authDomain: "prophetic-flames-fire.firebaseapp.com",
      projectId: "prophetic-flames-fire",
      storageBucket: "prophetic-flames-fire.firebasestorage.app",
      messagingSenderId: "1039526655615",
      appId: "1:1039526655615:web:c5a68086c00804253d314a",
      measurementId: "G-7RXNMMSHVP"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);

    const alertEl = document.getElementById('alert');

    function showAlert(msg, isSuccess = false) {
      alertEl.textContent = msg;
      alertEl.className = 'alert show' + (isSuccess ? ' success' : '');
      setTimeout(() => alertEl.classList.remove('show'), 5000);
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;

      if (password !== confirm) { showAlert('❌ Passwords do not match.'); return; }
      if (password.length < 6) { showAlert('❌ Password must be at least 6 characters.'); return; }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        if (name) await updateProfile(userCredential.user, { displayName: name });
        showAlert('✅ Account created successfully! Redirecting...', true);
        setTimeout(() => window.location.href = 'admin.html', 1500);
      } catch (error) {
        showAlert('❌ ' + error.message);
      }
    });
  </script>
</body>
</html>
